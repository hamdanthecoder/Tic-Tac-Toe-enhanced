<svg width="600" height="300" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@800&amp;display=swap');
    .title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 52px; letter-spacing: -1px; }
    .sub   { font-family: 'Syne', sans-serif; font-weight: 400; font-size: 13px; letter-spacing: 5px; }
    .mark  { font-family: 'Syne', sans-serif; font-weight: 800; }
  </style>

  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff6b6b"/>
      <stop offset="50%"  stop-color="#f7c948"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f7c948"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="40" y="20" width="600" height="300" rx="28" fill="#0d0d18"/>

  <!-- Subtle grid lines -->
  <line x1="40" y1="140" x2="640" y2="140" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="40" y1="200" x2="640" y2="200" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="220" y1="20" x2="220" y2="320" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
  <line x1="280" y1="20" x2="280" y2="320" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- Mini board grid -->
  <line x1="100" y1="105" x2="100" y2="235" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="130" y1="105" x2="130" y2="235" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="70"  y1="135" x2="160" y2="135" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="70"  y1="165" x2="160" y2="165" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5" stroke-linecap="round"/>

  <!-- X marks -->
  <text x="85"  y="128" text-anchor="middle" class="mark" font-size="20" fill="#ff6b6b" fill-opacity="0.9">✗</text>
  <text x="145" y="128" text-anchor="middle" class="mark" font-size="20" fill="#ff6b6b" fill-opacity="0.6">✗</text>
  <text x="115" y="158" text-anchor="middle" class="mark" font-size="20" fill="#ff6b6b" fill-opacity="0.9">✗</text>

  <!-- O marks -->
  <text x="115" y="128" text-anchor="middle" class="mark" font-size="20" fill="#4ecdc4" fill-opacity="0.7">○</text>
  <text x="85"  y="158" text-anchor="middle" class="mark" font-size="20" fill="#4ecdc4" fill-opacity="0.9">○</text>
  <text x="145" y="158" text-anchor="middle" class="mark" font-size="20" fill="#4ecdc4" fill-opacity="0.5">○</text>

  <!-- Winning diagonal line -->
  <line x1="82" y1="115" x2="148" y2="174" stroke="#ff6b6b" stroke-width="2.5" stroke-opacity="0.7" stroke-linecap="round"/>

  <!-- Right decorative marks -->
  <text x="575" y="175" text-anchor="middle" class="mark" font-size="88" fill="#ff6b6b" fill-opacity="0.12">✗</text>
  <text x="600" y="200" text-anchor="middle" class="mark" font-size="60" fill="#4ecdc4" fill-opacity="0.10">○</text>

  <!-- Main title with gradient -->
  <text x="340" y="178" text-anchor="middle" class="title" fill="url(#grad1)">TIC TAC</text>
  <text x="340" y="234" text-anchor="middle" class="title" fill="url(#grad2)">TOE</text>

  <!-- Accent dots -->
  <circle cx="340" cy="255" r="2" fill="#f7c948" fill-opacity="0.6"/>

  <!-- Tagline -->
  <text x="340" y="274" text-anchor="middle" class="sub" fill="#ffffff" fill-opacity="0.3">THE CLASSIC GAME</text>

  <!-- Traffic light dots -->
  <circle cx="66" cy="44" r="3" fill="#ff6b6b" fill-opacity="0.5"/>
  <circle cx="80" cy="44" r="3" fill="#f7c948" fill-opacity="0.5"/>
  <circle cx="94" cy="44" r="3" fill="#4ecdc4" fill-opacity="0.5"/>

  <!-- Border -->
  <rect x="40" y="20" width="600" height="300" rx="28" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1.5"/>

  <!-- Accent underline -->
  <line x1="220" y1="244" x2="460" y2="244" stroke="#f7c948" stroke-width="1" stroke-opacity="0.25" stroke-linecap="round"/>
</svg>
